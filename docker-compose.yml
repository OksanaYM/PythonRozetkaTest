services:
  db:
    image: mysql:8
    env_file:
      - .env
    ports:
      - "3333:3306"
    volumes:
      - ./mysql:/var/lib/mysql
    restart: on-failure
  app:
    build:
      context: .
    volumes:
      - ./backend:/app
    env_file:
      - .env
    ports:
      - "7777:8000"
    restart: on-failure
    command: >
      sh -c "python manage.py runserver 0.0.0.0:8000"